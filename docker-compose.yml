services:
  db:
    image: postgres:18-alpine
    container_name: arbiter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arbiter
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ stores data in a version subdir under /var/lib/postgresql,
      # so the volume mounts there (not at .../data).
      - arbiter-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arbiter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  arbiter-db-data:
